services:
  - type: web
    name: f1-quali-predictor-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: ./start.sh
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: PYTHON_VERSION
        value: 3.11.9

  - type: web
    name: f1-quali-predictor-web
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://f1-quali-predictor-api.onrender.com
